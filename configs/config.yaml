server:
  port: 8080
  host: "localhost"

database:
  dialect: "mysql"  # или "postgres"
  #dsn: "host=localhost user=go_game password=secret dbname=go_game port=5432 sslmode=disable"
  # Для MariaDB:
  dsn: "go_game:secret@tcp(localhost:3306)/go_game?charset=utf8mb4&parseTime=True&loc=Local"

messenger:
  api_url: "https://platform-api.max.ru/v1"  # реальный API MAX
  token: "your_bot_token_here"               # токен вашего бота
  webhook_url: ""  # если пусто, будет использован long polling
  use_webhook: false  # true для webhook, false для long polling

logging:
  level: "info"
  format: "json"
